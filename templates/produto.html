<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>{{ produto.nome }} - Detalhes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-color: #f9f9f9;
        font-family: 'Arial', sans-serif;
      }
      .navbar {
        background-color: #000000;
      }
      .navbar-brand img {
        width: 50px;
        height: auto;
      }
      .navbar-brand {
        color: #fdd835 !important;
        font-weight: bold;
        font-size: 1.25rem;
      }
      .produto-imagem {
        width: 100%;
        height: 400px;
        object-fit: contain;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease-in-out;
      }
      .produto-imagem:hover {
        transform: scale(1.05);
      }
      .card {
        border: none;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        background-color: #ffffff;
        transition: transform 0.2s ease;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .card-body {
        padding: 30px;
      }
      .card-title {
        font-size: 1.5rem;
        font-weight: bold;
        color: #333;
      }
      .card-subtitle {
        font-size: 1rem;
        color: #6c757d;
      }
      .produto-preco {
        font-size: 1.5rem;
        font-weight: bold;
        color: #28a745;
        margin-top: 15px;
      }
      .descricao {
        font-size: 1.125rem;
        color: #444;
        margin-top: 15px;
        line-height: 1.6;
      }
      .btn-custom {
        background-color: #fdd835;
        border: none;
        color: #fff;
        border-radius: 50px;
        padding: 12px 30px;
        font-weight: bold;
        font-size: 1rem;
        transition: background-color 0.3s ease;
      }
      .btn-custom:hover {
        background-color: #c8a000;
      }
      .container {
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <!-- Barra de navegação com logo e busca -->
    <nav class="navbar navbar-expand-lg navbar-light">
      <a class="navbar-brand" href="/">
        <img src="https://scontent.fmxp9-2.fna.fbcdn.net/v/t39.30808-6/448020429_441447745303078_6648644685849405109_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=jrqdElGhlbUQ7kNvgFks8cR&_nc_zt=23&_nc_ht=scontent.fmxp9-2.fna&_nc_gid=AmGvGuCChFvuLQz0AfeSzGW&oh=00_AYDZQlJW9XdCopORUKSGGUhkjcKguP8Hzhk_XYw6LvgKXA&oe=67A3D248" alt="Logo Estilo Musical">
        Estilo Musical
      </a>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <!-- Exibição da imagem principal -->
          <img src="{{ produto.imagemURL }}" alt="{{ produto.nome }}" class="produto-imagem">
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">{{ produto.nome }}</h5>
              <p class="card-subtitle">
                <strong>Código:</strong> {{ produto.codigo if produto.codigo else 'N/A' }}<br>
              </p>
              <p class="produto-preco">
                <strong>Preço:</strong> {{ produto.preco | formatarPreco }}
              </p>
              <div class="descricao">
                <strong>Descrição:</strong> <br>
                {{ produto.descricaoCurta | safe }}
              </div>
              <!-- Botão "Voltar" para voltar à página de listagem -->
              <a href="/" class="btn-custom mt-4">Voltar</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
